<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo">
      <span class="logo-name">Tom Bartley</span>
      <span class="logo-rule"></span>
      <span class="logo-sub">Change Leadership for Infrastructure</span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="nav-link{{ if eq $.RelPermalink .URL }} nav-link--active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <a href="/contact/" class="nav-cta">Get in Touch</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
