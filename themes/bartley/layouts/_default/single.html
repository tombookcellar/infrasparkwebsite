{{ define "main" }}
<article class="page">
  <div class="page-header">
    <div class="container">
      <h1 class="page-title">{{ .Title }}</h1>
      {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
    </div>
  </div>
  <div class="page-body">
    <div class="container">
      <div class="prose">
        {{ .Content }}
      </div>
    </div>
  </div>
</article>
{{ end }}
